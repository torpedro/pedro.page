<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Hi, I'm Pedro Flemming and this is my personal webpage. I'm a Software Engineer. Here you can see some of my work and find details about me.">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href='https://fonts.googleapis.com/css?family=Raleway:400,300' rel='stylesheet' type='text/css' />
  <link rel="stylesheet" href="index.scss" />
  <title>Pedro Flemming - Software Engineer</title>
</head>
<body>
  <main class="site-shell">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero__panel hero__panel--enter" tabindex="0">
        <header class="hero__header">
          <h1 id="hero-title">Pedro Flemming</h1>
          <p class="hero__subtitle">Software Engineer in London, UK</p>
        </header>

        <nav class="social-links" aria-label="Social links">
          <a
            class="social-links__item social-links__item--linkedin"
            href="https://www.linkedin.com/in/pedroflemming"
            target="_blank"
            rel="noreferrer"
            aria-label="Pedro Flemming on LinkedIn"
          ></a>
          <a
            class="social-links__item social-links__item--github"
            href="https://github.com/torpedro"
            target="_blank"
            rel="noreferrer"
            aria-label="Pedro Flemming on GitHub"
          ></a>
        </nav>
      </div>
    </section>
  </main>
  <script>
    const heroPanel = document.querySelector(".hero__panel");

    if (heroPanel) {
      const triggerWobble = (event) => {
        const rect = heroPanel.getBoundingClientRect();
        const clientX = event.clientX ?? rect.left + rect.width / 2;
        const clientY = event.clientY ?? rect.top + rect.height / 2;
        const normalizedX = (clientX - rect.left) / rect.width - 0.5;
        const normalizedY = (clientY - rect.top) / rect.height - 0.5;
        const rotateY = normalizedX * 26;
        const rotateX = normalizedY * -26;

        heroPanel.style.setProperty("--wobble-rotate-x", `${rotateX.toFixed(2)}deg`);
        heroPanel.style.setProperty("--wobble-rotate-y", `${rotateY.toFixed(2)}deg`);
        heroPanel.classList.remove("hero__panel--wobble");

        window.requestAnimationFrame(() => {
          heroPanel.classList.add("hero__panel--wobble");
        });
      };

      heroPanel.addEventListener("pointerup", triggerWobble);
      heroPanel.addEventListener("animationend", (event) => {
        if (event.animationName === "hero-enter") {
          heroPanel.classList.remove("hero__panel--enter");
        }

        if (event.animationName === "hero-wobble-3d") {
          heroPanel.classList.remove("hero__panel--wobble");
        }
      });
    }
  </script>
</body>
</html>
